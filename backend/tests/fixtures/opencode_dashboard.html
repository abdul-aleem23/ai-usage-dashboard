<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OpenCode Go - Dashboard</title>
</head>
<body>
  <main>
    <h1>OpenCode Go</h1>
    <p>Welcome back</p>

    <section class="usage-cards">
      <div class="card rolling-usage">
        <h3>Rolling Usage</h3>
        <div class="stat-value">2%</div>
        <div class="reset-label">Resets in 3h 12m</div>
        <p>Rolling 5-hour window</p>
      </div>

      <div class="card weekly-usage">
        <h3>Weekly Usage</h3>
        <div class="stat-value">12%</div>
        <div class="reset-label">Resets in 2d 4h</div>
      </div>

      <div class="card monthly-usage">
        <h3>Monthly Usage</h3>
        <div class="stat-value">47%</div>
        <div class="reset-label">Resets at 2026-07-01</div>
      </div>
    </section>

    <section class="other">
      <h3>Account</h3>
      <p>Plan: Pro</p>
    </section>
  </main>
</body>
</html>
